<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Prospia · Relevamiento</title>
<meta name="robots" content="noindex" />
<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet" />
<style>
  :root {
    --navy:#0C1730; --navy-2:#0F1B36; --surface-up:#13213C; --steel:#43577B;
    --amber:#F5B23D; --fog:#EEF3FB; --fog-muted:#8294B4;
    --paper:#E9E7E2; --ink:#0C1730; --ink-soft:#3C465C; --border:#E3DCCE;
    --success:#46B17B; --danger:#E5664D;
    --font-display:'Sora',system-ui,-apple-system,sans-serif;
    --font-mono:'JetBrains Mono',ui-monospace,monospace;
  }
  * { box-sizing:border-box; }
  html,body { margin:0; padding:0; }
  body {
    font-family:var(--font-display); color:var(--ink);
    background:var(--paper);
    background-image:radial-gradient(1200px 400px at 50% -120px, rgba(67,87,123,.10), transparent);
    -webkit-font-smoothing:antialiased;
  }

  /* ── Header ── */
  header {
    background:var(--navy); color:var(--fog);
    border-bottom:1px solid rgba(255,255,255,.08);
  }
  .head-inner { max-width:780px; margin:0 auto; padding:20px 24px; display:flex; align-items:center; gap:14px; }
  .iso { width:34px; height:34px; flex:none; }
  .brand-name { font-weight:700; font-size:20px; letter-spacing:.2px; }
  .brand-sub { color:var(--fog-muted); font-size:13px; margin-top:1px; }

  /* ── Progress (sticky) ── */
  .progress-wrap { position:sticky; top:0; z-index:20; background:var(--navy-2); border-bottom:1px solid rgba(255,255,255,.06); }
  .progress-inner { max-width:780px; margin:0 auto; padding:10px 24px; display:flex; align-items:center; gap:14px; }
  .progress-bar { flex:1; height:7px; background:rgba(255,255,255,.10); border-radius:999px; overflow:hidden; }
  .progress-fill { height:100%; width:0%; background:var(--amber); border-radius:999px; transition:width .25s ease; }
  .progress-label { font-family:var(--font-mono); font-size:12px; color:var(--fog-muted); white-space:nowrap; }

  /* ── Indicador de autoguardado (arriba a la derecha, junto al %) ── */
  .save-status {
    display:inline-flex; align-items:center; gap:6px; white-space:nowrap;
    font-size:12px; color:var(--fog-muted); min-width:96px;
    border-left:1px solid rgba(255,255,255,.10); padding-left:14px;
  }
  .save-status.ok { color:var(--success); }
  .save-status.err { color:var(--danger); cursor:pointer; }
  .save-status svg { width:13px; height:13px; flex:none; }
  .save-status.saving svg { animation:spin 1s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }

  main { max-width:780px; margin:0 auto; padding:28px 24px 80px; }

  .intro { font-size:15px; color:var(--ink-soft); line-height:1.6; margin:0 0 24px; }
  .intro strong { color:var(--ink); }

  .section {
    background:#fff; border:1px solid var(--border); border-radius:14px;
    padding:22px 22px 8px; margin-bottom:18px; box-shadow:0 1px 2px rgba(12,23,48,.05);
  }
  .section-head { margin-bottom:6px; }
  .section-num { font-family:var(--font-mono); font-size:12px; color:var(--amber); font-weight:600; }
  .section-title { font-size:18px; font-weight:600; margin:2px 0 4px; }
  .section-desc { font-size:13.5px; color:var(--ink-soft); line-height:1.55; margin:0 0 14px; }

  .field { margin-bottom:16px; }
  label.field-label { display:block; font-size:14px; font-weight:500; margin-bottom:5px; }
  .req { color:var(--amber); }
  .help { font-size:12.5px; color:var(--ink-soft); margin:4px 0 0; line-height:1.45; }

  input[type=text], input[type=email], input[type=tel], input[type=url], input[type=number],
  textarea, select {
    width:100%; font-family:var(--font-display); font-size:14px; color:var(--ink);
    background:#fff; border:1px solid var(--border); border-radius:10px; padding:10px 12px;
    outline:none; transition:border-color .15s, box-shadow .15s;
  }
  textarea { min-height:84px; resize:vertical; line-height:1.5; }
  input:focus, textarea:focus, select:focus { border-color:var(--amber); box-shadow:0 0 0 3px rgba(245,178,61,.18); }

  .checks { display:flex; flex-wrap:wrap; gap:8px; }
  .chk {
    display:inline-flex; align-items:center; gap:7px; font-size:13.5px;
    border:1px solid var(--border); border-radius:999px; padding:7px 13px; cursor:pointer;
    user-select:none; transition:all .15s;
  }
  .chk input { accent-color:var(--amber); }
  .chk.on { border-color:var(--amber); background:rgba(245,178,61,.10); }

  .file-row { display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
  .file-btn {
    display:inline-flex; align-items:center; gap:7px; font-size:13.5px; font-weight:500;
    border:1px dashed var(--steel); color:var(--ink-soft); background:#fbfaf7;
    border-radius:10px; padding:9px 14px; cursor:pointer;
  }
  .file-btn:hover { border-color:var(--amber); color:var(--ink); }
  .file-list { list-style:none; padding:0; margin:8px 0 0; font-family:var(--font-mono); font-size:12px; color:var(--ink-soft); }
  .file-list li { padding:3px 0; display:flex; align-items:center; gap:8px; }
  .file-list .rm { color:var(--danger); cursor:pointer; font-weight:600; }

  .submit-row { margin-top:24px; display:flex; align-items:center; gap:16px; flex-wrap:wrap; }
  button.cta {
    font-family:var(--font-display); font-weight:600; font-size:15px;
    background:var(--amber); color:var(--navy); border:none; border-radius:12px;
    padding:13px 28px; cursor:pointer; box-shadow:0 8px 24px rgba(245,178,61,.28);
    transition:transform .1s, filter .15s;
  }
  button.cta:hover { filter:brightness(1.04); }
  button.cta:active { transform:translateY(1px); }
  button.cta:disabled { opacity:.6; cursor:default; box-shadow:none; }
  .save-note { font-size:12.5px; color:var(--ink-soft); }
  .err { color:var(--danger); font-size:13.5px; margin-top:10px; }

  /* ── Thank-you ── */
  .done { text-align:center; padding:60px 24px; }
  .done .iso { width:56px; height:56px; margin:0 auto 18px; }
  .done h2 { font-size:24px; margin:0 0 10px; }
  .done p { color:var(--ink-soft); font-size:15px; line-height:1.6; max-width:440px; margin:0 auto; }

  .loading { text-align:center; color:var(--ink-soft); padding:60px 24px; font-size:14px; }

  footer { text-align:center; color:var(--ink-soft); font-size:12px; padding:0 24px 40px; }
  footer .iso-mini { width:14px; height:14px; vertical-align:-2px; opacity:.7; }

  /* ── Chat de ayuda (burbuja flotante) ── */
  .help-fab {
    position:fixed; right:20px; bottom:20px; z-index:50;
    display:flex; align-items:center; gap:9px; cursor:pointer;
    background:var(--navy); color:var(--fog); border:none;
    border-radius:999px; padding:13px 18px; font-family:var(--font-display);
    font-size:14px; font-weight:600; box-shadow:0 8px 24px rgba(12,23,48,.28);
  }
  .help-fab:hover { filter:brightness(1.08); }
  .help-fab svg { width:18px; height:18px; }
  .help-panel {
    position:fixed; right:20px; bottom:20px; z-index:51;
    width:min(380px, calc(100vw - 32px)); height:min(560px, calc(100vh - 40px));
    background:#fff; border:1px solid var(--border); border-radius:16px;
    box-shadow:0 16px 48px rgba(12,23,48,.28); display:none; flex-direction:column; overflow:hidden;
  }
  .help-panel.open { display:flex; }
  .help-head { background:var(--navy); color:var(--fog); padding:14px 16px; display:flex; align-items:center; gap:10px; }
  .help-head .iso { width:22px; height:22px; }
  .help-head .ht { font-weight:600; font-size:14px; }
  .help-head .hs { font-size:11px; color:var(--fog-muted); }
  .help-head .close { margin-left:auto; cursor:pointer; color:var(--fog-muted); background:none; border:none; font-size:18px; }
  .help-body { flex:1; overflow-y:auto; padding:14px; display:flex; flex-direction:column; gap:10px; background:var(--paper); }
  .msg { max-width:85%; padding:9px 12px; border-radius:12px; font-size:13.5px; line-height:1.45; white-space:pre-wrap; word-wrap:break-word; }
  .msg.bot { background:#fff; border:1px solid var(--border); color:var(--ink); align-self:flex-start; border-bottom-left-radius:4px; }
  .msg.user { background:var(--navy); color:var(--fog); align-self:flex-end; border-bottom-right-radius:4px; }
  .msg.typing { color:var(--ink-soft); font-style:italic; }
  .help-input { display:flex; gap:8px; padding:12px; border-top:1px solid var(--border); background:#fff; }
  .help-input textarea {
    flex:1; resize:none; font-family:var(--font-display); font-size:13.5px; color:var(--ink);
    border:1px solid var(--border); border-radius:10px; padding:9px 11px; outline:none; max-height:90px;
  }
  .help-input textarea:focus { border-color:var(--amber); box-shadow:0 0 0 3px rgba(245,178,61,.18); }
  .help-input button {
    background:var(--amber); color:var(--navy); border:none; border-radius:10px;
    padding:0 16px; font-weight:600; cursor:pointer; font-size:13.5px;
  }
  .help-input button:disabled { opacity:.5; cursor:default; }
</style>
</head>
<body>
  <header>
    <div class="head-inner">
      <svg class="iso" viewBox="0 0 100 100" aria-hidden="true">
        <g stroke="#EEF3FB" fill="#EEF3FB">
          <line x1="50" y1="52" x2="22" y2="24" stroke-width="2.5"/>
          <line x1="50" y1="52" x2="82" y2="22" stroke-width="2.5"/>
          <line x1="50" y1="52" x2="76" y2="78" stroke-width="2.5"/>
          <circle cx="22" cy="24" r="5.5" stroke="none"/>
          <circle cx="82" cy="22" r="5.5" stroke="none"/>
          <circle cx="76" cy="78" r="5.5" stroke="none"/>
          <circle cx="24" cy="74" r="5.5" stroke="none"/>
          <circle cx="50" cy="52" r="13" stroke="none" fill="#F5B23D"/>
        </g>
      </svg>
      <div>
        <div class="brand-name">Prospia</div>
        <div class="brand-sub" id="brandSub">Relevamiento de tu negocio</div>
      </div>
    </div>
  </header>

  <div class="progress-wrap">
    <div class="progress-inner">
      <div class="progress-bar"><div class="progress-fill" id="progFill"></div></div>
      <div class="progress-label" id="progLabel">0%</div>
      <div class="save-status" id="saveStatus"></div>
    </div>
  </div>

  <main id="main">
    <div class="loading" id="loading">Cargando formulario…</div>
  </main>

  <footer>
    <svg class="iso-mini" viewBox="0 0 100 100" aria-hidden="true"><g stroke="#43577B" fill="#43577B"><circle cx="50" cy="52" r="13" fill="#F5B23D" stroke="none"/><circle cx="22" cy="24" r="5.5" stroke="none"/><circle cx="82" cy="22" r="5.5" stroke="none"/></g></svg>
    Prospia · La señal que encuentra a tus próximos clientes
  </footer>

<script>
(function () {
  // Formulario genérico: el cliente se identifica por ?c=<slug> en el link.
  const params = new URLSearchParams(location.search);
  const SLUG = params.get('c') || '';
  const API = '/api';
  const LS_KEY = 'relevamiento_' + SLUG;

  const state = { values: {}, files: {} }; // files: {campoId: [File,...]}
  let SECCIONES = [];

  // Restaurar respuestas de texto guardadas (los archivos no se persisten).
  try {
    const saved = JSON.parse(localStorage.getItem(LS_KEY) || '{}');
    if (saved && saved.values) state.values = saved.values;
  } catch (e) {}

  // Copia local instantánea (respaldo offline). La fuente real vive en el server.
  function persist() {
    try { localStorage.setItem(LS_KEY, JSON.stringify({ values: state.values })); } catch (e) {}
  }

  // ── Indicador de autoguardado (mismo patrón que "Información del negocio") ──
  const ICON_SPIN = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M21 12a9 9 0 1 1-6.2-8.5"/></svg>';
  const ICON_CHECK = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>';
  const ICON_ALERT = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>';
  function setSaveStatus(estado, when) {
    const box = document.getElementById('saveStatus');
    if (!box) return;
    box.className = 'save-status ' + (estado === 'saved' ? 'ok' : estado === 'error' ? 'err' : 'saving');
    box.onclick = null;
    if (estado === 'saving') { box.innerHTML = ICON_SPIN + 'Guardando…'; }
    else if (estado === 'saved') {
      const hora = new Date(when || Date.now()).toLocaleTimeString('es-AR', { hour: '2-digit', minute: '2-digit' });
      box.innerHTML = ICON_CHECK + 'Guardado · ' + hora;
    } else if (estado === 'error') {
      box.innerHTML = ICON_ALERT + 'Error — reintentar';
      box.onclick = () => flushSave(false);
    } else { box.innerHTML = ''; }
  }

  // ── Autoguardado: debounce + flush al salir (desmontaje/recarga) ──
  let lastSavedSerialized = null;
  let saveTimer = null;
  function serializeDraft() { return JSON.stringify({ values: state.values, extra: [] }); }
  function scheduleSave() {
    persist();
    const s = serializeDraft();
    if (s === lastSavedSerialized) return;
    clearTimeout(saveTimer);
    saveTimer = setTimeout(() => flushSave(false), 1000);
  }
  function flushSave(keepalive) {
    const s = serializeDraft();
    if (s === lastSavedSerialized) return;
    lastSavedSerialized = s; // optimista: evita reguardar lo mismo
    setSaveStatus('saving');
    fetch(API + '/public/intake/' + encodeURIComponent(SLUG) + '/draft', {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: s,
      keepalive: !!keepalive,
    })
      .then(r => { if (!r.ok) throw new Error('Error ' + r.status); return r.json(); })
      .then(() => setSaveStatus('saved', Date.now()))
      .catch(() => { lastSavedSerialized = null; setSaveStatus('error'); }); // permitir reintento
  }
  window.addEventListener('beforeunload', () => flushSave(true));

  const el = (tag, attrs, html) => {
    const n = document.createElement(tag);
    if (attrs) for (const k in attrs) n.setAttribute(k, attrs[k]);
    if (html != null) n.innerHTML = html;
    return n;
  };
  const esc = (s) => String(s).replace(/[&<>"]/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;' }[c]));

  function requiredFields() {
    const out = [];
    SECCIONES.forEach(s => s.campos.forEach(c => { if (c.oblig && c.tipo !== 'archivo') out.push(c.id); }));
    return out;
  }

  function updateProgress() {
    const req = requiredFields();
    const done = req.filter(id => {
      const v = state.values[id];
      return Array.isArray(v) ? v.length > 0 : (v != null && String(v).trim() !== '');
    }).length;
    const pct = req.length ? Math.round(done / req.length * 100) : 100;
    document.getElementById('progFill').style.width = pct + '%';
    document.getElementById('progLabel').textContent = pct + '%';
  }

  function setVal(id, v) { state.values[id] = v; updateProgress(); scheduleSave(); }

  function renderField(c) {
    const wrap = el('div', { class: 'field' });
    const lbl = el('label', { class: 'field-label', for: 'f_' + c.id },
      esc(c.label) + (c.oblig ? ' <span class="req">*</span>' : ''));
    wrap.appendChild(lbl);
    const cur = state.values[c.id];

    if (c.tipo === 'textarea') {
      const t = el('textarea', { id: 'f_' + c.id });
      if (cur) t.value = cur;
      t.addEventListener('input', () => setVal(c.id, t.value));
      wrap.appendChild(t);
    } else if (c.tipo === 'select') {
      const sel = el('select', { id: 'f_' + c.id });
      sel.appendChild(el('option', { value: '' }, '— Elegir —'));
      (c.opciones || []).forEach(o => {
        const op = el('option', { value: o }, esc(o));
        if (cur === o) op.setAttribute('selected', '');
        sel.appendChild(op);
      });
      sel.addEventListener('change', () => setVal(c.id, sel.value));
      wrap.appendChild(sel);
    } else if (c.tipo === 'multiselect') {
      const box = el('div', { class: 'checks' });
      const arr = Array.isArray(cur) ? cur.slice() : [];
      (c.opciones || []).forEach(o => {
        const on = arr.includes(o);
        const chip = el('label', { class: 'chk' + (on ? ' on' : '') });
        const cb = el('input', { type: 'checkbox' });
        cb.checked = on;
        cb.addEventListener('change', () => {
          const a = Array.isArray(state.values[c.id]) ? state.values[c.id].slice() : [];
          if (cb.checked) { if (!a.includes(o)) a.push(o); chip.classList.add('on'); }
          else { const i = a.indexOf(o); if (i >= 0) a.splice(i, 1); chip.classList.remove('on'); }
          setVal(c.id, a);
        });
        chip.appendChild(cb);
        chip.appendChild(document.createTextNode(o));
        box.appendChild(chip);
      });
      wrap.appendChild(box);
    } else if (c.tipo === 'archivo') {
      const row = el('div', { class: 'file-row' });
      const inp = el('input', { type: 'file', id: 'f_' + c.id, style: 'display:none', multiple: c.multiple ? 'true' : '' });
      const btn = el('label', { class: 'file-btn', for: 'f_' + c.id }, '⬆ Subir archivo' + (c.multiple ? '(s)' : ''));
      const list = el('ul', { class: 'file-list' });
      const refresh = () => {
        list.innerHTML = '';
        (state.files[c.id] || []).forEach((f) => {
          const li = el('li');
          const sz = f.size ? ' (' + Math.round(f.size / 1024) + ' KB)' : '';
          const est = f.uploading ? ' · subiendo…' : (f.error ? ' · error, reintentá' : '');
          li.appendChild(document.createTextNode('📎 ' + f.name + sz + est));
          if (!f.uploading) {
            const rm = el('span', { class: 'rm' }, '✕');
            rm.addEventListener('click', () => removeFile(c.id, f));
            li.appendChild(rm);
          }
          list.appendChild(li);
        });
      };
      // Borrar: si nunca llegó al server, solo lo saco de la lista; si tiene id, lo borro en el server.
      const removeFile = (campo, f) => {
        const arr = state.files[campo] || [];
        const i = arr.indexOf(f);
        if (i >= 0) arr.splice(i, 1);
        refresh();
        if (f.id) {
          fetch(API + '/public/intake/' + encodeURIComponent(SLUG) + '/archivo/' + encodeURIComponent(f.id), { method: 'DELETE' }).catch(() => {});
        }
      };
      // Subir al instante apenas se adjunta (no hay botón de envío).
      const uploadFile = (campo, file) => {
        const entry = { name: file.name, size: file.size, uploading: true };
        state.files[campo] = (state.files[campo] || []).concat([entry]);
        refresh();
        const fd = new FormData();
        fd.append('campo', campo);
        fd.append('archivo', file);
        fetch(API + '/public/intake/' + encodeURIComponent(SLUG) + '/archivo', { method: 'POST', body: fd })
          .then(r => { if (!r.ok) throw new Error('Error ' + r.status); return r.json(); })
          .then(d => { entry.id = d.id; entry.uploading = false; entry.error = false; refresh(); })
          .catch(() => { entry.uploading = false; entry.error = true; refresh(); });
      };
      inp.addEventListener('change', () => {
        Array.from(inp.files).forEach(f => uploadFile(c.id, f));
        inp.value = '';
      });
      row.appendChild(btn);
      wrap.appendChild(row);
      wrap.appendChild(list);
      refresh(); // muestra los archivos ya subidos (restaurados del server)
    } else {
      const type = ({ email:'email', tel:'tel', url:'url', number:'number' })[c.tipo] || 'text';
      const inp = el('input', { type, id: 'f_' + c.id });
      if (cur) inp.value = cur;
      inp.addEventListener('input', () => setVal(c.id, inp.value));
      wrap.appendChild(inp);
    }

    if (c.ayuda) wrap.appendChild(el('p', { class: 'help' }, esc(c.ayuda)));
    return wrap;
  }

  function render() {
    const main = document.getElementById('main');
    main.innerHTML = '';
    main.appendChild(el('p', { class: 'intro' },
      'Completá lo que puedas — se guarda solo a medida que escribís, podés volver más tarde. ' +
      'Lo marcado con <span class="req">*</span> es lo importante para arrancar. ' +
      '<strong>Cuanto más detalle nos des sobre tu cliente ideal y más archivos subas, mejor vamos a filtrar a quién contactar.</strong>'));

    SECCIONES.forEach((s, i) => {
      const sec = el('div', { class: 'section' });
      const head = el('div', { class: 'section-head' });
      head.appendChild(el('div', { class: 'section-num' }, 'Sección ' + (i + 1)));
      head.appendChild(el('div', { class: 'section-title' }, esc(s.titulo)));
      if (s.descripcion) head.appendChild(el('p', { class: 'section-desc' }, esc(s.descripcion)));
      sec.appendChild(head);
      s.campos.forEach(c => sec.appendChild(renderField(c)));
      main.appendChild(sec);
    });

    main.appendChild(el('p', { class: 'save-note', style: 'margin-top:10px' },
      'No hay botón para enviar: todo se guarda solo a medida que completás. Podés cerrar y volver cuando quieras — incluso desde otro dispositivo.'));
    updateProgress();
    // Baseline: lo recién cargado ya está "guardado" (no dispara un PUT al abrir).
    lastSavedSerialized = serializeDraft();
  }

  async function boot() {
    if (!SLUG) {
      document.querySelector('.progress-wrap').style.display = 'none';
      document.getElementById('main').innerHTML =
        '<div class="loading">Este link no es válido. Pedí a quien te lo compartió el enlace correcto de tu relevamiento.</div>';
      return;
    }
    try {
      const [schemaRes, metaRes] = await Promise.all([
        fetch(API + '/public/intake-schema'),
        fetch(API + '/public/intake/' + encodeURIComponent(SLUG)),
      ]);
      if (!metaRes.ok && metaRes.status === 404) {
        document.querySelector('.progress-wrap').style.display = 'none';
        document.getElementById('main').innerHTML =
          '<div class="loading">No encontramos el cliente de este link. Verificá el enlace que te compartieron.</div>';
        return;
      }
      const schema = await schemaRes.json();
      SECCIONES = schema.secciones || [];
      if (metaRes.ok) {
        const meta = await metaRes.json();
        document.getElementById('brandSub').textContent = 'Relevamiento · ' + (meta.nombre || SLUG);
        // El server es la fuente de verdad: si ya hay borrador, lo usamos (permite
        // retomar desde otro dispositivo). Si no, queda lo de localStorage.
        if (meta.values && Object.keys(meta.values).length) state.values = meta.values;
        (meta.archivos || []).forEach(a => {
          (state.files[a.campo] = state.files[a.campo] || []).push({ id: a.id, name: a.nombre_original, size: a.size });
        });
      }
      render();
    } catch (e) {
      document.getElementById('main').innerHTML =
        '<div class="loading">No se pudo cargar el formulario. Verificá el link o probá de nuevo más tarde.</div>';
    }
  }

  boot();
})();
</script>

<!-- ── Chat de ayuda flotante ── -->
<button class="help-fab" id="helpFab" aria-label="Ayuda para completar">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
  ¿Dudas? Te ayudo
</button>

<div class="help-panel" id="helpPanel" aria-live="polite">
  <div class="help-head">
    <svg class="iso" viewBox="0 0 100 100" aria-hidden="true"><g stroke="#EEF3FB" fill="#EEF3FB"><line x1="50" y1="52" x2="22" y2="24" stroke-width="3"/><line x1="50" y1="52" x2="82" y2="22" stroke-width="3"/><circle cx="22" cy="24" r="6" stroke="none"/><circle cx="82" cy="22" r="6" stroke="none"/><circle cx="50" cy="52" r="14" stroke="none" fill="#F5B23D"/></g></svg>
    <div>
      <div class="ht">Asistente de Prospia</div>
      <div class="hs">Te ayudo a completar el formulario</div>
    </div>
    <button class="close" id="helpClose" aria-label="Cerrar">✕</button>
  </div>
  <div class="help-body" id="helpBody"></div>
  <div class="help-input">
    <textarea id="helpText" rows="1" placeholder="Escribí tu duda…"></textarea>
    <button id="helpSend">Enviar</button>
  </div>
</div>

<script>
(function () {
  const params = new URLSearchParams(location.search);
  const SLUG = params.get('c') || '';
  const API = '/api';
  const fab = document.getElementById('helpFab');
  const panel = document.getElementById('helpPanel');
  const body = document.getElementById('helpBody');
  const input = document.getElementById('helpText');
  const sendBtn = document.getElementById('helpSend');
  const history = []; // {role, content}
  let busy = false, greeted = false;

  // Sin cliente identificado no hay chat (el form tampoco carga).
  if (!SLUG) { if (fab) fab.style.display = 'none'; return; }

  function addMsg(role, text, cls) {
    const div = document.createElement('div');
    div.className = 'msg ' + (cls || (role === 'user' ? 'user' : 'bot'));
    div.textContent = text;
    body.appendChild(div);
    body.scrollTop = body.scrollHeight;
    return div;
  }

  function openPanel() {
    panel.classList.add('open');
    fab.style.display = 'none';
    if (!greeted) {
      greeted = true;
      addMsg('bot', '¡Hola! Soy el asistente de Prospia. Si no sabés qué poner en algún campo, preguntame y te ayudo. 😊');
    }
    setTimeout(() => input.focus(), 50);
  }
  function closePanel() { panel.classList.remove('open'); fab.style.display = ''; }

  fab.addEventListener('click', openPanel);
  document.getElementById('helpClose').addEventListener('click', closePanel);

  async function send() {
    const text = input.value.trim();
    if (!text || busy) return;
    input.value = '';
    input.style.height = 'auto';
    addMsg('user', text);
    history.push({ role: 'user', content: text });
    busy = true; sendBtn.disabled = true;
    const typing = addMsg('bot', 'Escribiendo…', 'bot typing');
    try {
      const res = await fetch(API + '/public/intake/' + encodeURIComponent(SLUG) + '/ayuda', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ mensajes: history }),
      });
      typing.remove();
      if (res.status === 429) { addMsg('bot', 'Estás escribiendo muy seguido 😅 Esperá un momentito y volvé a preguntar.'); return; }
      if (!res.ok) { addMsg('bot', 'Uy, no pude responder ahora. Probá de nuevo en un momento.'); return; }
      const data = await res.json();
      const r = (data.respuesta || '').trim() || 'No tengo una respuesta para eso, ¿lo reformulás?';
      addMsg('bot', r);
      history.push({ role: 'assistant', content: r });
    } catch (e) {
      typing.remove();
      addMsg('bot', 'Hubo un problema de conexión. Probá de nuevo.');
    } finally {
      busy = false; sendBtn.disabled = false; input.focus();
    }
  }

  sendBtn.addEventListener('click', send);
  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
  });
  input.addEventListener('input', () => {
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 90) + 'px';
  });
})();
</script>
</body>
</html>
