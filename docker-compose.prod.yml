services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: plataforma
      POSTGRES_USER: plataforma
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U plataforma"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql://plataforma:${POSTGRES_PASSWORD}@db:5432/plataforma
      SECRET_KEY: ${SECRET_KEY}
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 60
      WEBHOOK_TOKEN: ${WEBHOOK_TOKEN}
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "8000"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    depends_on:
      - backend
    expose:
      - "80"
    restart: unless-stopped

volumes:
  pgdata:
