<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pendientes · Prospia</title>
  <style>
    :root {
      --bg: #fafaf9; --bg-card: #ffffff; --text: #1a1a1a; --text-muted: #6b6b6b;
      --border: #ebeae8; --border-strong: #d4d3d0; --accent: #7c3aed; --accent-soft: #ede4ff;
      --green: #15803d; --green-soft: #dcfce7; --red: #dc2626;
      --prio-alta: #dc2626; --prio-alta-soft: #fee2e2;
      --prio-media: #d97706; --prio-media-soft: #fef3c7;
      --prio-baja: #6b6b6b; --prio-baja-soft: #ececec;
      --shadow: 0 1px 2px rgba(0,0,0,0.04), 0 1px 6px rgba(0,0,0,0.03);
      --mono: 'SF Mono', 'JetBrains Mono', Menlo, Monaco, 'Courier New', monospace;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0f0f10; --bg-card: #1a1a1c; --text: #ededed; --text-muted: #9a9a9a;
        --border: #2a2a2c; --border-strong: #3a3a3c; --accent: #a78bfa; --accent-soft: #4c1d9555;
        --green: #4ade80; --green-soft: #14532d55; --red: #f87171;
        --prio-alta: #f87171; --prio-alta-soft: #7f1d1d55;
        --prio-media: #fbbf24; --prio-media-soft: #78350f55;
        --prio-baja: #9a9a9a; --prio-baja-soft: #2a2a2c;
        --shadow: 0 1px 2px rgba(0,0,0,0.3), 0 4px 12px rgba(0,0,0,0.15);
      }
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', system-ui, sans-serif;
      background: var(--bg); color: var(--text); line-height: 1.55;
      -webkit-font-smoothing: antialiased; min-height: 100vh;
    }
    .container { max-width: 880px; margin: 0 auto; padding: 0 24px; }
    button { font-family: inherit; }
    input, select, textarea {
      font-family: inherit; font-size: 14px; width: 100%;
      background: var(--bg); color: var(--text);
      border: 1px solid var(--border-strong); border-radius: 8px; padding: 9px 11px;
    }
    textarea { resize: vertical; min-height: 64px; line-height: 1.5; }
    label.field { display: block; margin-bottom: 12px; }
    label.field > span {
      display: block; font-size: 11px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.06em; color: var(--text-muted); margin-bottom: 5px;
    }

    /* Header */
    header {
      position: sticky; top: 0; z-index: 10;
      background: color-mix(in srgb, var(--bg) 88%, transparent);
      backdrop-filter: saturate(180%) blur(14px);
      -webkit-backdrop-filter: saturate(180%) blur(14px);
      border-bottom: 1px solid var(--border); padding: 22px 0 14px;
    }
    .header-row { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
    h1 { font-size: 26px; font-weight: 700; letter-spacing: -0.02em; display: flex; align-items: center; gap: 10px; }
    h1 .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 12px var(--accent); }
    .subtitle { color: var(--text-muted); font-size: 13px; margin-top: 2px; }
    .progress { margin-top: 14px; display: flex; align-items: center; gap: 12px; }
    .progress-bar-wrap { flex: 1; height: 6px; background: var(--border); border-radius: 999px; overflow: hidden; }
    .progress-bar { height: 100%; background: linear-gradient(90deg, var(--accent), var(--green)); width: 0%; transition: width 0.4s cubic-bezier(0.4,0,0.2,1); border-radius: 999px; }
    .progress-text { font-size: 12px; color: var(--text-muted); font-variant-numeric: tabular-nums; white-space: nowrap; font-family: var(--mono); }

    .filters { display: flex; gap: 6px; margin: 24px 0 20px; flex-wrap: wrap; }
    .filter-btn { padding: 6px 12px; border: 1px solid var(--border); background: var(--bg-card); color: var(--text-muted); font-size: 13px; font-weight: 500; border-radius: 999px; cursor: pointer; transition: all 0.15s; }
    .filter-btn:hover { border-color: var(--border-strong); color: var(--text); }
    .filter-btn.active { background: var(--text); color: var(--bg); border-color: var(--text); }
    .filters .sep { width: 1px; background: var(--border); margin: 2px 4px; }

    .block { margin-bottom: 36px; }
    .block-header { margin-bottom: 10px; padding: 0 4px; }
    .block-title { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-muted); }
    .block-title .id-prefix { color: var(--accent); font-family: var(--mono); margin-right: 6px; }

    .test { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; margin-bottom: 8px; box-shadow: var(--shadow); transition: opacity 0.2s, border-color 0.15s; overflow: hidden; }
    .test:hover { border-color: var(--border-strong); }
    .test.done { opacity: 0.5; }
    .test.done:hover { opacity: 0.75; }
    .test-head { display: flex; align-items: center; gap: 12px; padding: 14px 16px; cursor: pointer; user-select: none; }
    .checkbox { width: 22px; height: 22px; border: 2px solid var(--border-strong); border-radius: 6px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.15s; background: var(--bg); }
    .checkbox:hover { border-color: var(--accent); }
    .test.done .checkbox { background: var(--green); border-color: var(--green); }
    .checkbox svg { width: 14px; height: 14px; color: white; opacity: 0; transition: opacity 0.15s; }
    .test.done .checkbox svg { opacity: 1; }
    .test-id { font-family: var(--mono); font-size: 11px; background: var(--accent-soft); color: var(--accent); padding: 3px 8px; border-radius: 5px; font-weight: 600; flex-shrink: 0; }
    .test.done .test-id { background: var(--green-soft); color: var(--green); }
    .test-title { font-weight: 500; flex: 1; font-size: 15px; }
    .test.done .test-title { text-decoration: line-through; }
    .prio { font-family: var(--mono); font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em; padding: 3px 7px; border-radius: 5px; flex-shrink: 0; }
    .prio.alta { background: var(--prio-alta-soft); color: var(--prio-alta); }
    .prio.media { background: var(--prio-media-soft); color: var(--prio-media); }
    .prio.baja { background: var(--prio-baja-soft); color: var(--prio-baja); }
    .test.done .prio { opacity: 0.6; }
    .test-toggle { color: var(--text-muted); font-size: 11px; transition: transform 0.2s ease; flex-shrink: 0; }
    .test.open .test-toggle { transform: rotate(180deg); }
    .test-body { max-height: 0; overflow: hidden; transition: max-height 0.35s cubic-bezier(0.4,0,0.2,1); }
    .test.open .test-body { max-height: 6000px; }
    .test-body-inner { padding: 16px 16px 18px 50px; border-top: 1px solid var(--border); }
    .test-section { margin-bottom: 14px; }
    .test-section-title { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-muted); margin-bottom: 6px; }
    .test-section-content { font-size: 14px; color: var(--text); line-height: 1.55; }
    .test-section-content p { white-space: pre-wrap; }
    .test-section-content ul { list-style: none; padding: 0; }
    .test-section-content ul li { padding-left: 18px; position: relative; margin-bottom: 5px; }
    .test-section-content ul li::before { content: '→'; position: absolute; left: 0; color: var(--accent); font-family: var(--mono); }
    .test-section.que_armar ul li::before { content: '▸'; color: var(--accent); }
    .test-section.consideraciones ul li::before { content: '!'; color: var(--prio-media); font-weight: 700; }
    .test-section-content code { background: var(--border); padding: 1px 5px; border-radius: 4px; font-size: 13px; font-family: var(--mono); }
    .item-actions { display: flex; gap: 8px; margin-top: 16px; padding-top: 12px; border-top: 1px dashed var(--border); }
    .item-actions button { background: transparent; border: 1px solid var(--border); color: var(--text-muted); padding: 6px 12px; border-radius: 7px; font-size: 12px; font-weight: 600; cursor: pointer; transition: all 0.15s; }
    .item-actions button:hover { border-color: var(--border-strong); color: var(--text); }
    .item-actions button.danger:hover { border-color: var(--red); color: var(--red); }
    .added-date { font-size: 10px; color: var(--text-muted); font-family: var(--mono); margin-left: auto; align-self: center; }

    .empty { text-align: center; padding: 70px 20px; color: var(--text-muted); font-size: 14px; }

    /* Floating add button */
    .fab { position: fixed; bottom: 28px; right: 28px; z-index: 20; width: 56px; height: 56px; border-radius: 50%; background: var(--accent); color: #fff; border: none; font-size: 28px; line-height: 1; cursor: pointer; box-shadow: 0 4px 16px rgba(0,0,0,0.25); transition: transform 0.15s; }
    .fab:hover { transform: scale(1.06); }

    /* Toast */
    .toast { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--text); color: var(--bg); padding: 12px 20px; border-radius: 10px; font-size: 14px; font-weight: 600; box-shadow: 0 6px 24px rgba(0,0,0,0.35); opacity: 0; pointer-events: none; transition: opacity 0.25s, transform 0.25s; z-index: 50; display: flex; align-items: center; gap: 8px; }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .toast::before { content: '✓'; color: var(--green); font-weight: 800; }

    /* Modal */
    .overlay { position: fixed; inset: 0; z-index: 30; background: rgba(0,0,0,0.45); display: none; align-items: flex-start; justify-content: center; padding: 40px 16px; overflow-y: auto; }
    .overlay.show { display: flex; }
    .modal { background: var(--bg-card); border: 1px solid var(--border); border-radius: 16px; box-shadow: 0 12px 48px rgba(0,0,0,0.3); width: 100%; max-width: 560px; padding: 24px; }
    .modal h2 { font-size: 18px; font-weight: 700; margin-bottom: 16px; }
    .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 8px; }
    .btn { padding: 9px 16px; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; border: 1px solid var(--border-strong); background: var(--bg); color: var(--text); }
    .btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
    .btn:disabled { opacity: 0.5; cursor: default; }
    .row2 { display: flex; gap: 12px; }
    .row2 > * { flex: 1; }
    .err { color: var(--red); font-size: 13px; margin: 8px 0 0; min-height: 18px; }

    /* Login */
    .login-wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
    .login-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 16px; box-shadow: var(--shadow); width: 100%; max-width: 360px; padding: 28px; }
    .login-card h1 { font-size: 22px; margin-bottom: 4px; }
    .login-card .subtitle { margin-bottom: 20px; }
    .hidden { display: none !important; }
    .topbar-btn { background: transparent; border: 1px solid var(--border); color: var(--text-muted); padding: 7px 12px; border-radius: 8px; font-size: 12px; cursor: pointer; }
    .topbar-btn:hover { border-color: var(--border-strong); color: var(--text); }
  </style>
</head>
<body>

  <!-- LOGIN -->
  <div id="login" class="login-wrap">
    <div class="login-card">
      <h1><span class="dot"></span>Pendientes</h1>
      <p class="subtitle">Iniciá sesión (admin de Prospia)</p>
      <label class="field"><span>Usuario</span><input id="login-email" type="text" autocomplete="username" autocapitalize="none" placeholder="usuario"></label>
      <label class="field"><span>Contraseña</span><input id="login-pass" type="password" autocomplete="current-password" placeholder="••••••••"></label>
      <p class="err" id="login-err"></p>
      <button class="btn primary" id="login-btn" style="width:100%">Entrar</button>
    </div>
  </div>

  <!-- APP -->
  <div id="app" class="hidden">
    <header>
      <div class="container">
        <div class="header-row">
          <div>
            <h1><span class="dot"></span>Implementaciones pendientes</h1>
            <p class="subtitle">Cosas que decidimos armar y todavía no construimos</p>
          </div>
          <button class="topbar-btn" id="logout-btn">Salir</button>
        </div>
        <div class="progress">
          <div class="progress-bar-wrap"><div class="progress-bar" id="progress-bar"></div></div>
          <span class="progress-text" id="progress-text">0 / 0</span>
        </div>
      </div>
    </header>

    <main class="container">
      <div class="filters" id="filters">
        <button class="filter-btn active" data-filter="pending">Pendientes</button>
        <button class="filter-btn" data-filter="done">Hechas</button>
        <button class="filter-btn" data-filter="all">Todas</button>
        <span class="sep"></span>
        <button class="filter-btn area-btn active" data-area="">Todas las áreas</button>
        <button class="filter-btn area-btn" data-area="app">App</button>
        <button class="filter-btn area-btn" data-area="web">Web</button>
        <button class="filter-btn area-btn" data-area="etiguel">Etiguel</button>
      </div>
      <div id="blocks"></div>
    </main>
  </div>

  <button class="fab hidden" id="fab" title="Nuevo pendiente">+</button>
  <div class="toast" id="toast"></div>

  <!-- MODAL -->
  <div class="overlay" id="overlay">
    <div class="modal">
      <h2 id="modal-title">Nuevo pendiente</h2>
      <label class="field"><span>Qué hay que hacer</span><textarea id="f-texto" placeholder="Título / descripción corta"></textarea></label>
      <div class="row2">
        <label class="field"><span>Prioridad</span>
          <select id="f-prioridad"><option value="alta">Alta</option><option value="media" selected>Media</option><option value="baja">Baja</option></select>
        </label>
        <label class="field"><span>Área</span>
          <select id="f-area"><option value="app">App</option><option value="web">Web</option><option value="etiguel">Etiguel</option></select>
        </label>
      </div>
      <label class="field"><span>Contexto / Por qué</span><textarea id="f-contexto" placeholder="Opcional"></textarea></label>
      <label class="field"><span>Qué hay que armar (una línea por punto)</span><textarea id="f-que_armar" placeholder="Opcional"></textarea></label>
      <label class="field"><span>Consideraciones / Riesgos (una línea por punto)</span><textarea id="f-consideraciones" placeholder="Opcional"></textarea></label>
      <label class="field"><span>Depende de (una línea por punto)</span><textarea id="f-depende" placeholder="Opcional"></textarea></label>
      <label class="field"><span>Alcance a futuro</span><textarea id="f-alcance" placeholder="Opcional"></textarea></label>
      <p class="err" id="modal-err"></p>
      <div class="modal-actions">
        <button class="btn" id="modal-cancel">Cancelar</button>
        <button class="btn primary" id="modal-save">Guardar</button>
      </div>
    </div>
  </div>

  <script>
    const API = '/api';
    const TOKEN_KEY = 'prospia.pendientes.token';
    let token = localStorage.getItem(TOKEN_KEY) || '';
    let items = [];
    let filter = 'pending';
    let areaFilter = '';
    let openIds = {};
    let editingId = null;

    const AREA_LABELS = { app: 'App (Prospia Admin)', web: 'Web / Plataforma', etiguel: 'Etiguel / Scraper' };
    const AREA_ORDER = ['app', 'web', 'etiguel'];
    const SECTION_LABELS = { contexto: 'Contexto / Por qué', que_armar: 'Qué hay que armar', consideraciones: 'Consideraciones / Riesgos', depende: 'Depende de', alcance: 'Alcance a futuro' };
    const LIST_SECTIONS = ['que_armar', 'consideraciones', 'depende'];
    const SECTION_ORDER = ['contexto', 'que_armar', 'consideraciones', 'depende', 'alcance'];
    const PRIO_LABELS = { alta: 'Alta', media: 'Media', baja: 'Baja' };
    const PRIO_RANK = { alta: 0, media: 1, baja: 2 };

    function esc(s) { return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
    function withCode(s) { return esc(s).replace(/`([^`]+)`/g, '<code>$1</code>'); }

    // Separa "[DEP.1] Texto" → { badge:'DEP.1', title:'Texto' }
    function splitBadge(texto) {
      const m = /^\[([^\]]+)\]\s*(.*)$/s.exec(texto || '');
      return m ? { badge: m[1], title: m[2] } : { badge: null, title: texto || '' };
    }

    async function api(path, opts = {}) {
      const res = await fetch(API + path, {
        ...opts,
        headers: { 'Content-Type': 'application/json', ...(token ? { Authorization: 'Bearer ' + token } : {}), ...(opts.headers || {}) },
      });
      if (res.status === 401) { logout(); throw new Error('Sesión vencida'); }
      if (!res.ok) { let d; try { d = await res.json(); } catch {} throw new Error((d && d.detail) || ('Error ' + res.status)); }
      return res.status === 204 ? null : res.json();
    }

    // ---- Login ----
    async function doLogin() {
      const email = document.getElementById('login-email').value.trim();
      const pass = document.getElementById('login-pass').value;
      const errEl = document.getElementById('login-err');
      const btn = document.getElementById('login-btn');
      errEl.textContent = ''; btn.disabled = true; btn.textContent = 'Entrando…';
      try {
        const r = await fetch(API + '/auth/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ email, password: pass }) });
        if (!r.ok) { const d = await r.json().catch(() => ({})); throw new Error(d.detail || 'Credenciales inválidas'); }
        const data = await r.json();
        token = data.access_token; localStorage.setItem(TOKEN_KEY, token);
        showApp();
      } catch (e) { errEl.textContent = e.message; }
      finally { btn.disabled = false; btn.textContent = 'Entrar'; }
    }
    function logout() { token = ''; localStorage.removeItem(TOKEN_KEY); document.getElementById('app').classList.add('hidden'); document.getElementById('fab').classList.add('hidden'); document.getElementById('login').classList.remove('hidden'); }

    async function showApp() {
      document.getElementById('login').classList.add('hidden');
      document.getElementById('app').classList.remove('hidden');
      document.getElementById('fab').classList.remove('hidden');
      await load();
    }

    async function load() {
      try { items = await api('/admin/pendientes?incluir_hechos=true'); render(); }
      catch (e) { if (e.message !== 'Sesión vencida') alert('No se pudo cargar: ' + e.message); }
    }

    // ---- Render ----
    function visible(it) {
      if (areaFilter && it.area !== areaFilter) return false;
      if (filter === 'pending') return !it.hecho;
      if (filter === 'done') return it.hecho;
      return true;
    }
    function renderSection(key, content) {
      if (!content) return '';
      let body;
      if (LIST_SECTIONS.includes(key)) {
        const lines = content.split('\n').map(s => s.trim()).filter(Boolean);
        body = `<ul>${lines.map(l => `<li>${withCode(l)}</li>`).join('')}</ul>`;
      } else { body = `<p>${withCode(content)}</p>`; }
      return `<div class="test-section ${key}"><div class="test-section-title">${SECTION_LABELS[key]}</div><div class="test-section-content">${body}</div></div>`;
    }
    function renderItem(it) {
      const { badge, title } = splitBadge(it.texto);
      const open = !!openIds[it.id];
      const sections = SECTION_ORDER.map(k => renderSection(k, it[k])).join('');
      const prio = it.prioridad || 'media';
      const fecha = it.fecha ? new Date(it.fecha).toLocaleDateString('es-AR') : '';
      return `
        <div class="test ${it.hecho ? 'done' : ''} ${open ? 'open' : ''}" data-id="${it.id}">
          <div class="test-head" onclick="toggleOpen(${it.id})">
            <div class="checkbox" onclick="toggleDone(${it.id}, event)">
              <svg viewBox="0 0 14 14" fill="none"><path d="M2 7L5.5 10.5L12 4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </div>
            ${badge ? `<span class="test-id">${esc(badge)}</span>` : ''}
            <span class="test-title">${esc(title)}</span>
            <span class="prio ${prio}">${PRIO_LABELS[prio] || prio}</span>
            <span class="test-toggle">▼</span>
          </div>
          <div class="test-body"><div class="test-body-inner">
            ${sections || '<div class="test-section-content" style="color:var(--text-muted);font-size:13px">Sin detalle. Tocá «Editar» para agregar contexto.</div>'}
            <div class="item-actions">
              <button onclick="copyItem(${it.id}, event)">Copiar</button>
              <button onclick="openEdit(${it.id}, event)">Editar</button>
              <button class="danger" onclick="del(${it.id}, event)">Borrar</button>
              ${fecha ? `<span class="added-date">Anotado ${esc(fecha)}</span>` : ''}
            </div>
          </div></div>
        </div>`;
    }
    function render() {
      const done = items.filter(i => i.hecho).length;
      const total = items.length;
      document.getElementById('progress-bar').style.width = (total ? done / total * 100 : 0) + '%';
      document.getElementById('progress-text').textContent = `${done} / ${total}`;
      const vis = items.filter(visible);
      let html = '';
      for (const area of AREA_ORDER) {
        const group = vis.filter(i => i.area === area).sort((a, b) => (PRIO_RANK[a.prioridad] ?? 3) - (PRIO_RANK[b.prioridad] ?? 3) || b.id - a.id);
        if (!group.length) continue;
        html += `<div class="block"><div class="block-header"><div class="block-title">${esc(AREA_LABELS[area])}</div></div>${group.map(renderItem).join('')}</div>`;
      }
      document.getElementById('blocks').innerHTML = html || '<div class="empty">Nada que mostrar en este filtro</div>';
    }

    // ---- Actions ----
    window.toggleOpen = (id) => { openIds[id] = !openIds[id]; render(); };
    window.toggleDone = async (id, ev) => {
      ev.stopPropagation();
      const it = items.find(i => i.id === id); if (!it) return;
      try { const u = await api('/admin/pendientes/' + id, { method: 'PATCH', body: JSON.stringify({ hecho: !it.hecho }) }); Object.assign(it, u); render(); }
      catch (e) { alert('No se pudo actualizar: ' + e.message); }
    };
    window.del = async (id, ev) => {
      ev.stopPropagation();
      const it = items.find(i => i.id === id); const { title } = splitBadge(it.texto);
      if (!confirm('¿Borrar este pendiente?\n\n' + title)) return;
      try { await api('/admin/pendientes/' + id, { method: 'DELETE' }); items = items.filter(i => i.id !== id); render(); }
      catch (e) { alert('No se pudo borrar: ' + e.message); }
    };

    // Arma el pendiente como texto plano, listo para pegar.
    function buildCopyText(it) {
      const { badge, title } = splitBadge(it.texto);
      let out = (badge ? `[${badge}] ` : '') + title + '\n';
      out += `Prioridad: ${it.prioridad} · Área: ${it.area}\n`;
      for (const k of SECTION_ORDER) {
        if (!it[k]) continue;
        out += `\n${SECTION_LABELS[k]}:\n`;
        if (LIST_SECTIONS.includes(k)) {
          out += it[k].split('\n').map(s => s.trim()).filter(Boolean).map(l => `- ${l}`).join('\n') + '\n';
        } else { out += it[k] + '\n'; }
      }
      return out.trim();
    }
    window.copyItem = async (id, ev) => {
      ev.stopPropagation();
      const it = items.find(i => i.id === id); if (!it) return;
      const text = buildCopyText(it);
      try {
        await navigator.clipboard.writeText(text);
      } catch {
        const ta = document.createElement('textarea');
        ta.value = text; ta.style.position = 'fixed'; ta.style.top = '-1000px';
        document.body.appendChild(ta); ta.focus(); ta.select();
        try { document.execCommand('copy'); } catch {}
        document.body.removeChild(ta);
      }
      showToast('Copiado al portapapeles');
    };

    let toastTimer = null;
    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => t.classList.remove('show'), 3000);
    }

    // ---- Modal ----
    function openModal(id) {
      editingId = id;
      document.getElementById('modal-title').textContent = id ? 'Editar pendiente' : 'Nuevo pendiente';
      document.getElementById('modal-err').textContent = '';
      const it = id ? items.find(i => i.id === id) : null;
      const v = (k, d = '') => it ? (it[k] ?? d) : d;
      // El texto en el form NO lleva el prefijo [ID] (se conserva tal cual al guardar editado)
      document.getElementById('f-texto').value = it ? it.texto : '';
      document.getElementById('f-prioridad').value = v('prioridad', 'media');
      document.getElementById('f-area').value = v('area', areaFilter || 'app');
      document.getElementById('f-contexto').value = v('contexto');
      document.getElementById('f-que_armar').value = v('que_armar');
      document.getElementById('f-consideraciones').value = v('consideraciones');
      document.getElementById('f-depende').value = v('depende');
      document.getElementById('f-alcance').value = v('alcance');
      document.getElementById('overlay').classList.add('show');
    }
    window.openEdit = (id, ev) => { ev.stopPropagation(); openModal(id); };
    function closeModal() { document.getElementById('overlay').classList.remove('show'); editingId = null; }
    async function saveModal() {
      const body = {
        texto: document.getElementById('f-texto').value.trim(),
        prioridad: document.getElementById('f-prioridad').value,
        area: document.getElementById('f-area').value,
        contexto: document.getElementById('f-contexto').value,
        que_armar: document.getElementById('f-que_armar').value,
        consideraciones: document.getElementById('f-consideraciones').value,
        depende: document.getElementById('f-depende').value,
        alcance: document.getElementById('f-alcance').value,
      };
      const errEl = document.getElementById('modal-err');
      if (!body.texto) { errEl.textContent = 'Poné al menos un título.'; return; }
      const btn = document.getElementById('modal-save'); btn.disabled = true; btn.textContent = 'Guardando…';
      try {
        if (editingId) { const u = await api('/admin/pendientes/' + editingId, { method: 'PATCH', body: JSON.stringify(body) }); Object.assign(items.find(i => i.id === editingId), u); }
        else { const n = await api('/admin/pendientes', { method: 'POST', body: JSON.stringify(body) }); items.push(n); }
        closeModal(); render();
      } catch (e) { errEl.textContent = e.message; }
      finally { btn.disabled = false; btn.textContent = 'Guardar'; }
    }

    // ---- Wiring ----
    document.getElementById('login-btn').addEventListener('click', doLogin);
    document.getElementById('login-pass').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
    document.getElementById('logout-btn').addEventListener('click', logout);
    document.getElementById('fab').addEventListener('click', () => openModal(null));
    document.getElementById('modal-cancel').addEventListener('click', closeModal);
    document.getElementById('modal-save').addEventListener('click', saveModal);
    document.getElementById('overlay').addEventListener('click', e => { if (e.target.id === 'overlay') closeModal(); });
    document.querySelectorAll('.filter-btn[data-filter]').forEach(b => b.addEventListener('click', () => {
      document.querySelectorAll('.filter-btn[data-filter]').forEach(x => x.classList.remove('active'));
      b.classList.add('active'); filter = b.dataset.filter; render();
    }));
    document.querySelectorAll('.area-btn').forEach(b => b.addEventListener('click', () => {
      document.querySelectorAll('.area-btn').forEach(x => x.classList.remove('active'));
      b.classList.add('active'); areaFilter = b.dataset.area; render();
    }));

    if (token) showApp(); else document.getElementById('login').classList.remove('hidden');
  </script>
</body>
</html>
