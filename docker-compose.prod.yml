services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: plataforma
      POSTGRES_USER: plataforma
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U plataforma"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql://plataforma:${POSTGRES_PASSWORD}@db:5432/plataforma
      SECRET_KEY: ${SECRET_KEY}
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 43200  # 30 días (app de admin personal; la seguridad real la da el desbloqueo del aparato)
      WEBHOOK_TOKEN: ${WEBHOOK_TOKEN}
      MONDAY_API_KEY: ${MONDAY_API_KEY:-}
      # Token del webhook de Etiguel — lo usa el relay de respuesta de consultas
      # (POST /responder-consulta) y el monitoreo de Camila (/camila-config/diag).
      ETIGUEL_DEPLOY_TOKEN: ${ETIGUEL_DEPLOY_TOKEN:-}
      # Resend (mails de aviso de consultas a clientes). Sender por defecto
      # notificaciones@prospia.app (RESEND_FROM tiene default en config.py).
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      UPLOADS_DIR: /app/uploads
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "8000"
    volumes:
      - uploads:/app/uploads
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    depends_on:
      - backend
    expose:
      - "80"
    restart: unless-stopped

volumes:
  pgdata:
  uploads:
